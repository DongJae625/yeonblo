      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.85);
      font-size: 15px;
      font-weight: 500;

<body>
  <div id="bg"></div>
  <canvas id="c"></canvas>
  <div id="hint">화면을 탭하면 벚꽃이 내려요 🌸</div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    const petals = [];
    const COLORS = ['#ffb7c5','#ffc8d4','#ffdde4','#ffe4ec','#fff0f4','#f9a8b8','#f7c5d0'];

    function createPetal(x, y) {
      const count = 12 + Math.floor(Math.random() * 10);
      for (let i = 0; i < count; i++) {
        petals.push({
          x: x + (Math.random() - 0.5) * 80,
          y: y - Math.random() * 40,
          vx: (Math.random() - 0.5) * 2.5,
          vy: -(Math.random() * 3 + 1),
          gravity: 0.07 + Math.random() * 0.04,
          size: 6 + Math.random() * 8,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.1,
          alpha: 0.85 + Math.random() * 0.15,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          wobble: Math.random() * Math.PI * 2,
          wobbleSpeed: 0.03 + Math.random() * 0.03,
          life: 1.0,
          decay: 0.004 + Math.random() * 0.004
        });
      }
    }

    function drawPetal(p) {
      ctx.save();
      ctx.globalAlpha = p.alpha * p.life;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size, p.size * 0.6, 0, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.restore();
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = petals.length - 1; i >= 0; i--) {
        const p = petals[i];
        p.wobble += p.wobbleSpeed;
        p.vx += Math.sin(p.wobble) * 0.05;
        p.vy += p.gravity;
        p.x += p.vx;
        p.y += p.vy;
        p.rotation += p.rotSpeed;
        p.life -= p.decay;
        if (p.life <= 0 || p.y > canvas.height + 20) {
          petals.splice(i, 1);
        } else {
          drawPetal(p);
        }
      }
      requestAnimationFrame(animate);
    }
    animate();

    let hintHidden = false;
    let holdInterval = null;
    let holdPos = { x: 0, y: 0 };
    let holdTime = 0;

    function hideHint() {
      if (!hintHidden) {
        document.getElementById('hint').style.opacity = '0';
        hintHidden = true;
      }
    }

    function getPos(e) {
      if (e.touches && e.touches.length > 0) {
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }

    function startHold(e) {
      const pos = getPos(e);
      holdPos = pos;
      holdTime = 0;
      hideHint();
      createPetal(pos.x, pos.y);
      clearInterval(holdInterval);
      holdInterval = setInterval(() => {
        holdTime++;
        const burst = Math.min(1 + Math.floor(holdTime / 5), 6);
        for (let i = 0; i < burst; i++) {
          createPetal(
            holdPos.x + (Math.random() - 0.5) * 30,
            holdPos.y + (Math.random() - 0.5) * 30
          );
        }
      }, 80);
    }

    function moveHold(e) {
      const pos = getPos(e);
      holdPos = pos;
    }

    function endHold() {
      clearInterval(holdInterval);
      holdInterval = null;
      holdTime = 0;
    }

    document.body.addEventListener('mousedown', startHold);
    document.body.addEventListener('mousemove', (e) => { if (holdInterval) moveHold(e); });
    document.body.addEventListener('mouseup', endHold);
    document.body.addEventListener('mouseleave', endHold);

    document.body.addEventListener('touchstart', startHold, { passive: true });
    document.body.addEventListener('touchmove', moveHold, { passive: true });
    document.body.addEventListener('touchend', endHold);
    document.body.addEventListener('touchcancel', endHold);
  </script>
